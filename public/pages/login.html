<section class="hero">
  <div class="container">
    <h1>Sign In</h1>
  </div>
</section>

<section class="login section">
  <div class="container" style="max-width: 400px;">
    <div class="login-card" style="background: rgba(15, 10, 30, 0.8); border: 1px solid #2D1B69; padding: 2rem; border-radius: 16px;">
      <form class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>
      <div class="login-divider" style="text-align: center; margin: 1.5rem 0; color: #B0B0C0;">
        OR
      </div>
      <button class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem;" onclick="window.location.href='/api/auth/google'">
        🔗 Continue with Google
      </button>
      <button class="btn btn-secondary" style="width: 100%;" onclick="window.location.href='/api/auth/github'">
        🔗 Continue with GitHub
      </button>
      <p class="text-secondary" style="text-align: center; margin-top: 1.5rem;">
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </div>
  </div>
</section>
