<section class="hero">
  <div class="container">
    <h1>Profile</h1>
  </div>
</section>

<section class="profile section">
  <div class="container" style="max-width: 800px;">
    <div class="profile-header" style="background: linear-gradient(135deg, rgba(108, 71, 255, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%); padding: 2rem; border-radius: 16px; margin-bottom: 2rem;">
      <div class="flex-between align-items-start">
        <div>
          <h2 data-user-name>Welcome</h2>
          <p class="text-secondary" data-user-email>user@example.com</p>
        </div>
        <button class="btn btn-secondary" onclick="window.app.logout()">Logout</button>
      </div>
    </div>
    
    <div class="profile-content">
      <h3>Account Settings</h3>
      <form class="settings-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" value="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="john@example.com">
        </div>
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" placeholder="Tell us about yourself"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>
</section>
